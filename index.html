<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FUNTV - Exclusive Entertainment & Trending Videos</title>
	
    <!-- Facebook & Social Media Bot Safe Meta Tags -->
    <meta name="description" content="Watch the latest trending viral videos, entertainment news, and exclusive updates on FUNTV.">
    <meta property="og:locale" content="en_US">
    <meta property="og:type" content="website">
    <meta property="og:title" content="FUNTV - Exclusive Entertainment & Trending Videos">
    <meta property="og:description" content="Watch the latest trending viral videos, entertainment news, and exclusive updates on FUNTV.">
    <meta property="og:url" content="https://funtv-updates.com/"> <!-- আপনার ল্যান্ডিং ডোমেইনটি এখানে দিন -->
    <meta property="og:site_name" content="FUNTV Official">
    <meta property="og:image" content="https://images.unsplash.com/photo-1594909122845-11baa439b7bf?w=600">
    <meta property="og:image:width" content="1200">
    <meta property="og:image:height" content="630">
    <meta name="twitter:card" content="summary_large_image">

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background-color: #141414;
            color: #ffffff;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            text-align: center;
        }
        .wrapper {
            max-width: 480px;
            width: 90%;
            background: #1f1f1f;
            padding: 40px 25px;
            border-radius: 16px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            border: 1px solid #333;
        }
        .logo {
            font-size: 32px;
            font-weight: 800;
            color: #e50914;
            letter-spacing: 2px;
            margin-bottom: 15px;
        }
        .divider {
            height: 2px;
            background: linear-gradient(to right, transparent, #e50914, transparent);
            margin-bottom: 25px;
        }
        .headline {
            font-size: 20px;
            font-weight: 600;
            margin-bottom: 10px;
            color: #f5f5f5;
        }
        .subtext {
            font-size: 14px;
            color: #aaa;
            margin-bottom: 25px;
            line-height: 1.4;
        }
        .action-btn {
            display: inline-block;
            background: #e50914;
            color: #fff;
            text-decoration: none;
            padding: 14px 35px;
            font-size: 16px;
            font-weight: bold;
            border-radius: 30px;
            transition: transform 0.2s, background 0.2s;
            box-shadow: 0 5px 15px rgba(229, 9, 20, 0.4);
            cursor: pointer;
            border: none;
            width: 100%;
            margin-bottom: 20px;
        }
        .action-btn:hover {
            background: #ff1e27;
            transform: translateY(-2px);
        }
        
        /* কাউন্টডাউন ও প্রগ্রেস বার স্টাইল */
        .countdown-container {
            font-size: 15px;
            color: #e50914;
            font-weight: 600;
            margin-bottom: 10px;
        }
        .progress-bar-bg {
            width: 100%;
            height: 4px;
            background-color: #333;
            border-radius: 2px;
            overflow: hidden;
        }
        .progress-bar-fill {
            width: 0%;
            height: 100%;
            background-color: #e50914;
            transition: width 2s linear; /* ২ সেকেন্ডে পুরো ফিল হবে */
        }
        
        .loading-text {
            margin-top: 20px;
            font-size: 12px;
            color: #555;
        }
    </style>
</head>
<body>

  <div class="wrapper">
      <div class="logo">FUNTV</div>
      <div class="divider"></div>
      
      <div class="headline">Your Video is Ready to Play!</div>
      <div class="subtext">Click the button below to stream instantly or wait for automatic redirection.</div>
      
      <!-- Safe Trigger Button -->
      <button class="action-btn" id="watchBtn">WATCH FULL VIDEO NOW</button>
      
      <!-- লাইভ কাউন্টডাউন এবং প্রগ্রেস বার -->
      <div class="countdown-container">
          Redirecting automatically in <span id="countdown">2</span>s...
      </div>
      <div class="progress-bar-bg">
          <div class="progress-bar-fill" id="progressBar"></div>
      </div>
      
      <div class="loading-text">Secured by FUNTV Anti-Bot System</div>
  </div>

  <script>
    const destinationUrl = "https://applyavailablebecoming.com/nkmzu75hi?key=7e0a7c08b50bd1c13eec0830918bbd21";

    // ১. বাটনে ক্লিক করলে সাথে সাথে রিডাইরেক্ট হবে
    document.getElementById("watchBtn").addEventListener("click", () => {
        window.location.replace(destinationUrl);
    });

    // ২. পেজ লোড হওয়ার পর কাউন্টডাউন এবং প্রগ্রেস বার চালু হবে
    window.addEventListener('load', () => {
        let count = 2;
        const countdownElement = document.getElementById("countdown");
        const progressBar = document.getElementById("progressBar");

        // প্রগ্রেস বার অ্যানিমেশন শুরু (২ সেকেন্ডের জন্য)
        setTimeout(() => {
            progressBar.style.width = "100%";
        }, 50);

        // প্রতি সেকেন্ডে ১ করে কমবে
        const timer = setInterval(() => {
            count--;
            if (count >= 0) {
                countdownElement.textContent = count;
            }
            
            if (count <= 0) {
                clearInterval(timer);
                window.location.replace(destinationUrl);
            }
        }, 1000);
    });
  </script>
</body>
</html>
