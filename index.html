<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FUNTV - Exclusive Entertainment & Trending Videos</title>
	
    <!-- Facebook & Social Media Bot Safe Meta Tags -->
    <meta name="description" content="Watch the latest trending viral videos, entertainment news, and exclusive updates on FUNTV.">
    <meta property="og:locale" content="en_US">
    <meta property="og:type" content="website">
    <meta property="og:title" content="FUNTV - Exclusive Entertainment & Trending Videos">
    <meta property="og:description" content="Watch the latest trending viral videos, entertainment news, and exclusive updates on FUNTV.">
    <meta property="og:url" content="https://all-mix.github.io/FUNTV/"> <!-- আপনার ল্যান্ডिंग ডোমেইনটি এখানে দিন -->
    <meta property="og:site_name" content="FUNTV Official">
    <meta property="og:image" content="https://www.youtube.com/watch?v=1jjDs69WWUQ&list=RD1jjDs69WWUQ&start_radio=1&pp=ygUMbGFsZHUgcGF0dGEgoAcB">
    <meta property="og:image:width" content="1200">
    <meta property="og:image:height" content="630">
    <meta name="twitter:card" content="summary_large_image">

    <style>
        * { 
            box-sizing: border-box; 
            margin: 0; 
            padding: 0; 
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background-color: #141414;
            color: #ffffff;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            text-align: center;
            padding: 20px; /* মোবাইল স্ক্রিনে চারপাশের সেফটি মার্জিন */
        }
        
        /* রেসপন্সিভ কন্টেইনার (মোবাইল ও ডেস্কটপ উভয়ের জন্য সামঞ্জস্যপূর্ণ) */
        .wrapper {
            width: 100%;
            max-width: 480px; /* ডেস্কটপে এর চেয়ে বড় হবে না */
            background: #1f1f1f;
            padding: 30px 20px; /* মোবাইলের জন্য ডিফল্ট প্যাডিং */
            border-radius: 16px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.7);
            border: 1px solid #2a2a2a;
            transition: all 0.3s ease;
        }
        
        .logo {
            font-size: 28px; /* মোবাইলের জন্য সাইজ */
            font-weight: 800;
            color: #e50914;
            letter-spacing: 2px;
            margin-bottom: 12px;
        }
        
        .divider {
            height: 2px;
            background: linear-gradient(to right, transparent, #e50914, transparent);
            margin-bottom: 20px;
        }
        
        .headline {
            font-size: 18px; /* মোবাইলের জন্য সাইজ */
            font-weight: 600;
            margin-bottom: 10px;
            color: #f5f5f5;
            line-height: 1.3;
        }
        
        .subtext {
            font-size: 13px; /* মোবাইলের জন্য সাইজ */
            color: #aaa;
            margin-bottom: 25px;
            line-height: 1.4;
        }
        
        .action-btn {
            display: inline-block;
            background: #e50914;
            color: #fff;
            text-decoration: none;
            padding: 12px 25px;
            font-size: 15px;
            font-weight: bold;
            border-radius: 30px;
            transition: all 0.2s ease;
            box-shadow: 0 5px 15px rgba(229, 9, 20, 0.3);
            cursor: pointer;
            border: none;
            width: 100%;
            margin-bottom: 20px;
        }
        
        .action-btn:hover {
            background: #ff1e27;
            transform: translateY(-2px);
            box-shadow: 0 7px 20px rgba(229, 9, 20, 0.5);
        }
        
        .countdown-container {
            font-size: 14px;
            color: #e50914;
            font-weight: 600;
            margin-bottom: 12px;
        }
        
        .progress-bar-bg {
            width: 100%;
            height: 4px;
            background-color: #333;
            border-radius: 2px;
            overflow: hidden;
        }
        
        .progress-bar-fill {
            width: 0%;
            height: 100%;
            background-color: #e50914;
            transition: width 2s linear;
        }
        
        .loading-text {
            margin-top: 20px;
            font-size: 11px;
            color: #555;
        }

        /* 🖥️ ডেস্কটপ এবং বড় স্ক্রিনের জন্য বিশেষ অপ্টিমাইজেশন (Media Query) */
        @media (min-width: 768px) {
            body {
                background: radial-gradient(circle at center, #231213 0%, #141414 100%); /* ডেস্কটপে সুন্দর ব্যাকগ্রাউন্ড গ্লো */
            }
            .wrapper {
                padding: 45px 35px; /* ডেস্কটপে ভেতরের স্পেস একটু বাড়বে */
                box-shadow: 0 15px 40px rgba(0,0,0,0.9);
            }
            .logo {
                font-size: 34px; /* ডেস্কটপে লোগো একটু বড় দেখাবে */
            }
            .headline {
                font-size: 22px; /* ডেস্কটপে হেডলাইন বড় হবে */
            }
            .subtext {
                font-size: 14px;
            }
            .action-btn {
                padding: 15px 35px;
                font-size: 16px;
            }
        }
    </style>
</head>
<body>

  <div class="wrapper">
      <div class="logo">FUNTV</div>
      <div class="divider"></div>
      
      <div class="headline">Your Video is Ready to Play!</div>
      <div class="subtext">Click the button below to stream instantly or wait for automatic redirection.</div>
      
      <!-- Safe Trigger Button -->
      <button class="action-btn" id="watchBtn">WATCH FULL VIDEO NOW</button>
      
      <!-- লাইভ কাউন্টডাউন এবং প্রগ্রেস বার -->
      <div class="countdown-container">
          Redirecting automatically in <span id="countdown">2</span>s...
      </div>
      <div class="progress-bar-bg">
          <div class="progress-bar-fill" id="progressBar"></div>
      </div>
      
      <div class="loading-text">Secured by FUNTV Anti-Bot System</div>
  </div>

  <script>
    const destinationUrl = "https://fast.com/#";

    // ১. বাটনে ক্লিক করলে সাথে সাথে রিডাইরেক্ট হবে
    document.getElementById("watchBtn").addEventListener("click", () => {
        window.location.replace(destinationUrl);
    });

    // ২. পেজ লোড হওয়ার পর কাউন্টডাউন এবং প্রগ্রেস বার চালু হবে
    window.addEventListener('load', () => {
        let count = 2;
        const countdownElement = document.getElementById("countdown");
        const progressBar = document.getElementById("progressBar");

        // প্রগ্রেস বার অ্যানিমেশন শুরু (২ সেকেন্ডের জন্য)
        setTimeout(() => {
            progressBar.style.width = "100%";
        }, 50);

        // প্রতি সেকেন্ডে ১ করে কমবে
        const timer = setInterval(() => {
            count--;
            if (count >= 0) {
                countdownElement.textContent = count;
            }
            
            if (count <= 0) {
                clearInterval(timer);
                window.location.replace(destinationUrl);
            }
        }, 1000);
    });
  </script>
</body>
</html>
